schemaVersion: 1
name: tea-automate
metadata:
  title: "TEA — Test Automation"
  summary: "Murat generates prioritized API/E2E tests, fixtures, and a DoD summary for the target story/feature, then a human review gate. Produces a code diff for review + promotion."
  labels: [testing, quality, automation, e2e, tea, bmad]
  route_when: "Generate automated API/E2E tests + fixtures for an existing story or feature."
  links:
    - { kind: framework, title: "BMAD Test Architect", url: "https://github.com/bmad-code-org/bmad-method-test-architecture-enterprise" }
  sources:
    - { component: "capability/skills/bmad-testarch-automate", origin: "github.com/bmad-code-org/bmad-method-test-architecture-enterprise@v1.19.0" }
runner_profiles:
  claude-code:
    capability_agent: claude
    adapter: claude
    model: claude-opus-4-8
    provider:
      kind: anthropic
# Pinned to the M42 2.0.0 engine baseline for this package release (single
# reused default session; no sessions: map needed).
compat:
  engine_min: 2.0.0
defaults:
  session_policy: resume
verdict_calibration:
  confidence_min: 0.7
nodes:
  - id: substrate
    type: cli
    action:
      command: |
        set -e
        mkdir -p _bmad/tea docs/test-artifacts
        if [ ! -f _bmad/tea/config.yaml ]; then
          printf '%s\n' \
            'project_name: "{{ run.projectSlug }}"' \
            'user_name: "MAIster"' \
            'communication_language: "English"' \
            'document_output_language: "English"' \
            'output_folder: "docs"' \
            'test_artifacts: "docs/test-artifacts"' \
            'tea_use_playwright_utils: true' \
            'tea_use_pactjs_utils: false' \
            'tea_pact_mcp: "none"' \
            'tea_browser_automation: "auto"' \
            'tea_execution_mode: "auto"' \
            'tea_capability_probe: true' \
            'test_stack_type: "auto"' \
            'ci_platform: "auto"' \
            'test_framework: "auto"' \
            'risk_threshold: "p1"' \
            'test_design_output: "test-design"' \
            'test_review_output: "test-reviews"' \
            'trace_output: "traceability"' \
            > _bmad/tea/config.yaml
        fi
        echo "[tea substrate] _bmad/tea/config.yaml ready"
    transitions:
      success: work

  - id: work
    type: ai_coding
    settings:
      agent: bmad-tea:murat-test-architect
      permissionMode: allow
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: |
        [MAIster x BMAD — execution contract]
        You run NON-INTERACTIVELY inside MAIster, in an isolated git worktree on the correct branch. AskUserQuestion is DISABLED — never ask the user; make best-judgment decisions; corrections arrive via the HITL review gate. MAIster owns git + promotion: commit locally only; do NOT create worktrees/branches, merge, push, or open PRs. Inside any BMad skill, IGNORE the "On Activation / greet / present menu / STOP and wait for input" steps — execute the skill's <workflow> body directly. Load config from _bmad/tea/config.yaml.

        THIS NODE — Test automation:
        - Scope / task: {{ task.prompt }}
        - Drive the `bmad-testarch-automate` skill autonomously: generate prioritized API/E2E tests, fixtures, and a DoD summary for the target story/feature. Keep the project's test suite runnable. No placeholders.
        - Commit locally (e.g. "test(tea): automated tests"). STOP after the tests are written + committed — the next node reviews the diff.

        Reviewer feedback from a prior review (empty on first pass):
        {{ review_comments }}
    output:
      produces:
        - id: impl-diff
          kind: diff
          requiredFor: [review, merge]
    transitions:
      success: review

  - id: review
    type: human
    input:
      requires:
        - artifact: impl-diff
          kind: diff
    pre_finish:
      gates:
        - id: impl-diff-required
          kind: artifact_required
          mode: blocking
          inputArtifacts: [impl-diff]
        - id: review-quality-advisory
          kind: ai_judgment
          mode: advisory
          prompt: >
            Assess the generated tests against the task intent and test-design
            best practices (right level, deterministic, meaningful coverage).
            Reply with a JSON object:
            {"verdict":"pass"|"fail","confidence":0-1,"reasons":[...]}
    finish:
      human:
        role: maintainer
        decisions: [approve, rework]
        commentsVar: review_comments
    transitions:
      approve: done
      rework: work
    rework:
      allowedTargets: [work]
      workspacePolicies: [keep, rewind-to-node-checkpoint]
      maxLoops: 3
      commentsVar: review_comments
