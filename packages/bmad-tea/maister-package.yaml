# MAIster package manifest. Contract: docs/pv/package-management.md (MAIster
# repo) — flows[].id MUST equal each flow.yaml `name`; paths are
# package-root-relative; the version pin is the git tag (bmad-tea/vX.Y.Z), never
# a field in this file.
#
# NOTE: the upstream BMAD Test Architect module version this package vendors
# (v1.19.0) is recorded in metadata.sources and the README — independent of this
# package's own git tag.
schemaVersion: 1
name: bmad-tea
metadata:
  title: "BMAD Method — Test Architect (TEA)"
  summary: "BMAD Test Architect enterprise module as MAIster flows. Murat (Master Test Architect) ships as a platform agent driving risk-based test design, automation, NFR audit, traceability + quality-gate, and test review — each a small flow with a human review gate. atdd / framework / ci / teach-me-testing skills are available via Murat standalone."
  links:
    - { kind: framework, title: "BMAD Test Architect", url: "https://github.com/bmad-code-org/bmad-method-test-architecture-enterprise" }
  sources:
    - { component: "capability/skills/bmad-testarch-* + bmad-teach-me-testing (9 workflow skills) + agents/murat-test-architect.md (persona derived from src/agents/bmad-tea customize.toml)", origin: "github.com/bmad-code-org/bmad-method-test-architecture-enterprise@v1.19.0" }
    - { component: "capability/reference/LICENSE.bmad", origin: "github.com/bmad-code-org/bmad-method-test-architecture-enterprise@v1.19.0 (MIT, © BMad Code, LLC)" }
flows:
  - { id: tea-test-design, path: flows/test-design }
  - { id: tea-automate, path: flows/automate }
  - { id: tea-nfr, path: flows/nfr }
  - { id: tea-trace, path: flows/trace }
  - { id: tea-test-review, path: flows/test-review }
# The whole capability/ subtree ships; only capability/skills/ is materialized
# into the run worktree's .claude/ (capability/reference/* is provenance only).
# Murat lives at the package-root agents/ dir, auto-scanned into the catalog.
capabilities:
  - { id: tea-bundle, path: capability }
# TEA workflows optionally use a Pact/PactFlow MCP (tea_pact_mcp), but that is
# off by default ("none") and project-specific. None shipped with the package.
mcps: []
