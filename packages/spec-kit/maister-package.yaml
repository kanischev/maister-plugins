# MAIster package manifest. Contract: docs/pv/package-management.md (MAIster
# repo) — flows[].id MUST equal each flow.yaml `name`; paths are
# package-root-relative; the version pin is the git tag (spec-kit/vX.Y.Z),
# never a field in this file.
#
# NOTE: the Spec Kit version this package drives (github/spec-kit@v0.10.3) is
# pinned inside `setup.sh` and the `sk-init` flow's `ensure` node (every
# `uv tool install … spec-kit.git@v0.10.3`). It is independent of the package tag.
schemaVersion: 1
name: spec-kit
metadata:
  title: "Spec Kit"
  summary: "GitHub Spec Kit spec-driven SDLC (constitution -> specify -> clarify -> plan -> tasks -> analyze -> implement) as MAIster flows (sk-dev, sk-init), driving the pinned specify CLI + the /speckit-* Claude skills. Reference bundle only — Spec Kit's skills are scaffolded into the project by `specify init`, not materialized by MAIster."
  links:
    - { kind: framework, title: "Spec Kit", url: "https://github.com/github/spec-kit" }
    - { kind: docs, title: "Spec-Driven Development", url: "https://github.com/github/spec-kit/blob/main/spec-driven.md" }
  sources:
    - { component: "capability/reference/* (phase + frontmatter reference)", origin: "git:github.com/github/spec-kit@v0.10.3" }
flows:
  - { id: sk-dev, path: flows/dev }
  - { id: sk-init, path: flows/init }
# Reference-only bundle (no skills/agents subtree → nothing is materialized into
# the worktree). Spec Kit's /speckit-* skills are written into the project by
# `specify init --integration claude` (sk-init), so MAIster ships none.
capabilities:
  - { id: spec-kit-reference, path: capability }
# Spec Kit is driven via its `specify` CLI + scaffolded skills, not an MCP server.
mcps: []
