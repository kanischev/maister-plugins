# MAIster package manifest. Contract: docs/pv/package-management.md (MAIster
# repo) — flows[].id MUST equal each flow.yaml `name`; paths are
# package-root-relative; the version pin is the git tag (superpowers/vX.Y.Z),
# never a field in this file.
schemaVersion: 1
name: superpowers
metadata:
  title: "Superpowers"
  summary: "obra/superpowers development methodology as MAIster flows (sp-dev, sp-debug, sp-plan, sp-execute) + the full vendored superpowers skills bundle."
  links:
    - { kind: framework, title: "Superpowers", url: "https://github.com/obra/superpowers" }
    - { kind: docs, title: "Package reference", url: "https://github.com/obra/superpowers#readme" }
  # Vendored upstream component version recorded here (no dedicated field yet —
  # the package tag is its own version; this records WHAT was vendored).
  sources:
    - { component: "skills/* (all 14)", origin: "github.com/obra/superpowers@5.1.0" }
flows:
  - { id: sp-dev, path: flows/dev }
  - { id: sp-debug, path: flows/debug }
  - { id: sp-plan, path: flows/plan }
  - { id: sp-execute, path: flows/execute }
capabilities:
  - { id: superpowers-bundle, path: capability }
# MCP server templates ship here when a package needs them ({id, transport,
# command|url, env: env:NAME references only, description}). Superpowers is a
# zero-dependency skills library — ships none.
mcps: []
