schemaVersion: 1
name: aif-dev
metadata:
  title: "AIF — Develop"
  summary: "Spec-driven delivery: intake → plan → improve → plan_review → implement → bounded autonomous checks→code_review→fix loop → human review → commit. The code_review judge routes fix/commit from its own output; loop exhaustion escalates to the human, who can restart the loop with a fresh budget."
  labels: [feature, enhancement, refactor]
  route_when: "A feature/enhancement/refactor with a clear spec."
  links:
    - { kind: framework, title: "AI Factory 2.x", url: "https://github.com/lee-to/ai-factory/tree/2.x" }
    - { kind: docs, title: "Dev Workflow", url: "https://github.com/lee-to/ai-factory/blob/2.x/docs/workflow.md" }
  sources:
    - { component: "skills/aif-*, agents/*", origin: "github.com/lee-to/ai-factory@2.x" }
runner_profiles:
  claude-code:
    capability_agent: claude
    adapter: claude
    model: claude-opus-4-8
    provider:
      kind: anthropic
# Typed artifacts → engine_min >= 1.2.0; M30 retry/session policies → >= 1.4.0;
# first-class sessions (M42, ADR-114) → engine_min >= 2.0.0; rework loop
# onExhaustion routing + human-driven counter reset (ADR-118) → >= 2.1.0.
compat:
  engine_min: 2.1.0
# M30 (ADR-081): rework re-entry resumes the prior ACP session by default; a
# per-rework `session_policy: new_session` overrides it where a clean re-attempt
# is wanted (the review→fix loop below).
defaults:
  session_policy: resume
# M42 (ADR-114): first-class sessions split the single reused agent context into
# fresh-context phases at meaningful boundaries — implement / verify / fix /
# commit — each inheriting the flow's one claude-code runner (no new runners).
# Cross-session state flows through the typed artifacts (impl-diff, gate result),
# not session memory. Planning (plan, improve) stays on the implicit `default`
# session.
sessions:
  implement: { runner: claude-code }
  verify: { runner: claude-code }
  fix: { runner: claude-code }
  commit: { runner: claude-code }
# Flow-level calibration default, folded into the advisory ai_judgment gate at compile.
verdict_calibration:
  confidence_min: 0.7
nodes:
  # Preferences intake — MAIster-native HITL form (AskUserQuestion is disabled in
  # the adapter; the skills run non-interactively against these answers).
  - id: intake
    type: form
    settings:
      form_schema: ./schemas/intake.json
    transitions:
      success: plan

  - id: plan
    type: ai_coding
    # M30 (ADR-080): auto-retry infra failures only; the workspace rewinds to
    # the pre-attempt checkpoint. Same policy on every ai_coding node below.
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      # `plan` is the plan_review rework target. On the initial visit
      # plan_review_comments is empty (runner-seeded); on a rework jump it
      # carries the reviewer's feedback so the re-plan addresses exactly what
      # was rejected.
      prompt: |
        @skill:aif-plan {{ task.prompt }}

        Non-interactive run — apply these preferences and do NOT ask:
        Testing={{ steps.intake.vars.tests }}, Logging={{ steps.intake.vars.logging }}, Docs={{ steps.intake.vars.docs }}.

        {{ plan_review_comments }}
    transitions:
      success: improve

  - id: improve
    type: ai_coding
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: |
        @skill:aif-improve

        Non-interactive run — do NOT ask the user clarifying questions; apply your best-judgment improvements directly.
    transitions:
      success: plan_review

  - id: plan_review
    type: human
    finish:
      human:
        role: maintainer
        decisions: [approve, rework]
        commentsVar: plan_review_comments
    transitions:
      approve: implement
      rework: plan
    rework:
      allowedTargets: [plan]
      workspacePolicies: [keep]
      maxLoops: 3
      commentsVar: plan_review_comments

  - id: implement
    type: ai_coding
    # M42: fresh context — the approved plan is read from disk, not session memory.
    session: implement
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: |
        @skill:aif-implement

        Non-interactive run — do NOT ask the user clarifying questions; proceed autonomously (tool-use permission prompts are handled by the platform).
    output:
      produces:
        - id: impl-diff
          kind: diff
          requiredFor: [review, merge]
    transitions:
      success: checks

  # Stack-agnostic verification (no hardcoded pnpm) — emits the gate result artifact.
  - id: checks
    type: ai_coding
    # M42: fresh verification context (the diff is read from disk).
    session: verify
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: |
        @skill:aif-verify

        Non-interactive run — do NOT ask the user clarifying questions; proceed autonomously.
    input:
      requires:
        - artifact: impl-diff
          kind: diff
    output:
      produces:
        - id: aif-gate-result
          kind: test_report
    transitions:
      success: code_review

  - id: code_review
    type: judge
    # M42: shares the verify session — reviews the same diff checks just gated.
    session: verify
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: |
        @skill:aif-review

        Non-interactive run — do NOT ask the user clarifying questions; proceed autonomously.

        End your response with a single `maister:output` block per the aif-review
        skill's "Native flow routing output" section: recommend "fix" when there is
        any CRITICAL finding (the loop then fixes and re-verifies), or "commit" when
        there are none (non-critical suggestions ride along in review_comments and do
        NOT block). Put the concrete items the next fix must address in review_comments.
    input:
      requires:
        - artifact: impl-diff
          kind: diff
    # ADR-103 (M38): route on the judge's own structured output. aif-review emits
    # {recommendation: fix|commit, review_comments} as a maister:output block;
    # `decide` reads recommendation and follows transitions[recommendation].
    output:
      result:
        schema: ./schemas/review-outcome.json
        required: true
    decide:
      from: output.recommendation
    transitions:
      fix: fix
      commit: review
      exhausted: review
    # ADR-118: the autonomous bounded review↔fix loop lives HERE. A "fix"
    # recommendation reworks to `fix` (→ checks → code_review) up to maxLoops on a
    # fresh session each round; the judge's review_comments inject into `fix`. On
    # exhaustion the loop routes to the human `review` (onExhaustion) instead of the
    # execution-policy A1 action, so the accumulated worktree is preserved.
    rework:
      allowedTargets: [fix]
      workspacePolicies: [keep]
      maxLoops: 5
      session_policy: new_session
      commentsVar: review_comments
      onExhaustion: exhausted

  - id: review
    type: human
    pre_finish:
      gates:
        - id: impl-diff-required
          kind: artifact_required
          mode: blocking
          inputArtifacts: [impl-diff]
        - id: ai-quality-advisory
          kind: ai_judgment
          mode: advisory
          prompt: >
            Assess the implementation diff against the task requirements.
            Reply with a JSON object:
            {"verdict":"pass"|"fail","confidence":0-1,"reasons":[...]}
    finish:
      human:
        role: maintainer
        decisions: [approve, rework, takeover]
        commentsVar: review_comments
    transitions:
      approve: commit
      rework: fix
      # Takeover returns at `checks` (NOT `commit`) so the human's local edits
      # are re-validated through /aif-verify + /aif-review before commit.
      takeover: checks
    rework:
      allowedTargets: [fix]
      # M30 (ADR-079): the reviewer picks — keep the tree as rejected, or
      # rewind to the pre-fix checkpoint for a clean re-attempt.
      workspacePolicies: [keep, rewind-to-node-checkpoint]
      maxLoops: 3
      commentsVar: review_comments
      # M42: each rework iteration re-enters `fix` on a fresh session so a stale
      # prior attempt never colors the next one.
      session_policy: new_session
      # ADR-118: a human rework re-baselines the code_review loop's attempt
      # counter → a fresh maxLoops budget, so the reviewer can restart the
      # autonomous loop with new guidance instead of being stuck post-exhaustion.
      resetTargets: [code_review]

  - id: fix
    type: ai_coding
    # M42: fresh rework context, focused on {{ review_comments }}.
    session: fix
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: |
        @skill:aif-fix {{ review_comments }}

        Non-interactive run — do NOT ask the user clarifying questions; proceed autonomously (tool-use permission prompts are handled by the platform).
    transitions:
      success: checks

  - id: commit
    type: ai_coding
    # M42: clean commit context — only the working tree matters here.
    session: commit
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: |
        @skill:aif-commit

        Non-interactive run — do NOT ask the user clarifying questions (e.g. do not prompt to push); commit only.
    pre_finish:
      gates:
        - id: commit-gate
          kind: command_check
          mode: blocking
          command: "test -z \"$(git status --porcelain --untracked-files=no)\" && git log -1 --pretty=%s | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\([^)]+\\))?!?: .+'"
    transitions:
      success: done
