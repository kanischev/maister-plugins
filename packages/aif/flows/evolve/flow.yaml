schemaVersion: 1
name: aif-evolve
metadata:
  title: "AIF — Evolve"
  summary: "Periodic maintenance: distill .ai-factory/patches/* into improved skill-context."
  labels: [maintenance, skills]
  route_when: "Periodic: distill fix-patches into better skills (not feature work)."
  links:
    - { kind: framework, title: "AI Factory 2.x", url: "https://github.com/lee-to/ai-factory/tree/2.x" }
    - { kind: docs, title: "Evolve / Reflex Loop", url: "https://github.com/lee-to/ai-factory/blob/2.x/docs/evolve.md" }
  sources:
    - { component: "skills/aif-*, agents/*", origin: "github.com/lee-to/ai-factory@2.x" }
runner_profiles:
  claude-code:
    capability_agent: claude
    adapter: claude
    model: claude-opus-4-8
    provider:
      kind: anthropic
# M29 mutation gate (commit node) + M30 retry/session policies → engine_min >= 1.4.0.
# Pinned to the M42 2.0.0 engine baseline for this package release (single
# reused default session; no sessions: map needed).
compat:
  engine_min: 2.0.0
# M30 (ADR-081): pin the engine default explicitly — one ACP session reused
# across nodes; per-node/per-rework policies override.
defaults:
  session_policy: resume
nodes:
  - id: evolve
    type: ai_coding
    # M30 (ADR-080): auto-retry infra failures only; the workspace rewinds to
    # the pre-attempt checkpoint. Same policy on every ai_coding node below.
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      # `evolve` is both the entry node and the review rework target. On entry
      # review_comments is empty (runner-seeded); on a rework jump it carries
      # the reviewer's feedback so the re-run addresses exactly what was
      # rejected.
      prompt: |
        /aif-evolve

        {{ review_comments }}
    transitions:
      success: review

  - id: review
    type: human
    finish:
      human:
        role: maintainer
        decisions: [approve, rework]
        commentsVar: review_comments
    transitions:
      approve: commit
      rework: evolve
    rework:
      allowedTargets: [evolve]
      workspacePolicies: [keep]
      maxLoops: 3
      commentsVar: review_comments

  - id: commit
    type: ai_coding
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: "/aif-commit"
    pre_finish:
      gates:
        - id: commit-gate
          kind: command_check
          mode: blocking
          command: "test -z \"$(git status --porcelain --untracked-files=no)\" && git log -1 --pretty=%s | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\([^)]+\\))?!?: .+'"
        # M29 (ADR-074): the run's WHOLE changeset is committed here (AIF
        # defers all committing to /aif-commit), so this node's range is the
        # full work and must include skill-context paths. No inputArtifacts —
        # presence passes vacuously; only the mutation assertion gates.
        - id: skill-context-touched
          kind: artifact_required
          mode: blocking
          must_touch: [".ai-factory/**", ".claude/**"]
          output:
            id: evolve-mutation-report
            kind: mutation_report
    transitions:
      success: done
