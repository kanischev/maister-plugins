schemaVersion: 1
name: aif-bugfix
metadata:
  title: "AIF — Bugfix"
  summary: "Fast bug loop: fix → checks → review → commit; emits a self-improvement patch."
  labels: [bug, hotfix, regression]
  route_when: "A reported bug/error to fix."
  links:
    - { kind: framework, title: "AI Factory 2.x", url: "https://github.com/lee-to/ai-factory/tree/2.x" }
    - { kind: docs, title: "Dev Workflow", url: "https://github.com/lee-to/ai-factory/blob/2.x/docs/workflow.md" }
  sources:
    - { component: "skills/aif-*, agents/*", origin: "github.com/lee-to/ai-factory@2.x" }
runner_profiles:
  claude-code:
    capability_agent: claude
    adapter: claude
    model: claude-sonnet-4-6
    provider:
      kind: anthropic
# Typed artifacts → engine_min >= 1.2.0; M30 retry/session policies → >= 1.4.0.
compat:
  engine_min: 1.4.0
# M30 (ADR-081): pin the engine default explicitly — one ACP session reused
# across nodes; per-node/per-rework policies override.
defaults:
  session_policy: resume
verdict_calibration:
  confidence_min: 0.7
nodes:
  - id: fix
    type: ai_coding
    # M30 (ADR-080): auto-retry infra failures only; the workspace rewinds to
    # the pre-attempt checkpoint. Same policy on every ai_coding node below.
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      # `fix` is both the entry node and the review rework target. On entry
      # review_comments is empty (runner-seeded); on a rework jump it carries the
      # reviewer's feedback so the re-fix addresses exactly what was rejected.
      prompt: |
        /aif-fix {{ task.prompt }}

        {{ review_comments }}
    output:
      produces:
        - id: impl-diff
          kind: diff
          requiredFor: [review, merge]
        - id: patch
          kind: generic_file
    transitions:
      success: checks

  - id: checks
    type: ai_coding
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: "/aif-verify"
    input:
      requires:
        - artifact: impl-diff
          kind: diff
    output:
      produces:
        - id: aif-gate-result
          kind: test_report
    transitions:
      success: code_review

  - id: code_review
    type: ai_coding
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: "/aif-review"
    input:
      requires:
        - artifact: impl-diff
          kind: diff
    output:
      produces:
        - id: ai-judgment
          kind: ai_judgment
    transitions:
      success: review

  - id: review
    type: human
    input:
      requires:
        - artifact: ai-judgment
          kind: ai_judgment
    pre_finish:
      gates:
        - id: impl-diff-required
          kind: artifact_required
          mode: blocking
          inputArtifacts: [impl-diff]
        - id: ai-quality-advisory
          kind: ai_judgment
          mode: advisory
          prompt: >
            Assess the fix diff against the reported bug.
            Reply with a JSON object:
            {"verdict":"pass"|"fail","confidence":0-1,"reasons":[...]}
    finish:
      human:
        role: maintainer
        decisions: [approve, rework]
        commentsVar: review_comments
    transitions:
      approve: commit
      rework: fix
    rework:
      allowedTargets: [fix]
      # M30 (ADR-079): the reviewer picks — keep the tree as rejected, or
      # rewind to the pre-fix checkpoint for a clean re-attempt.
      workspacePolicies: [keep, rewind-to-node-checkpoint]
      maxLoops: 3
      commentsVar: review_comments

  - id: commit
    type: ai_coding
    retry_policy:
      attempts: 2
      on_errors: [SPAWN, EXECUTOR_UNAVAILABLE, CHECKPOINT, ACP_PROTOCOL]
      workspace: rewind-to-node-checkpoint
    action:
      prompt: "/aif-commit"
    pre_finish:
      gates:
        - id: commit-gate
          kind: command_check
          mode: blocking
          command: "test -z \"$(git status --porcelain --untracked-files=no)\" && git log -1 --pretty=%s | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\([^)]+\\))?!?: .+'"
    transitions:
      success: done
