# MAIster package manifest. Contract: docs/pv/package-management.md (MAIster
# repo) — flows[].id MUST equal each flow.yaml `name`; paths are
# package-root-relative; the version pin is the git tag (aif/vX.Y.Z), never a
# field in this file.
schemaVersion: 1
name: aif
metadata:
  title: "AI Factory"
  summary: "Spec-driven delivery flows (dev, bugfix, evolve, roadmap, init) + vendored AIF skills/agents bundle."
  links:
    - { kind: framework, title: "AI Factory 2.x", url: "https://github.com/lee-to/ai-factory/tree/2.x" }
    - { kind: docs, title: "Dev Workflow", url: "https://github.com/lee-to/ai-factory/blob/2.x/docs/workflow.md" }
  sources:
    - { component: "skills/aif-*, agents/*", origin: "github.com/lee-to/ai-factory@2.x" }
flows:
  - { id: aif-dev, path: flows/dev }
  - { id: aif-bugfix, path: flows/bugfix }
  - { id: aif-evolve, path: flows/evolve }
  - { id: aif-roadmap, path: flows/roadmap }
  - { id: aif-init, path: flows/init }
capabilities:
  - { id: aif-bundle, path: capability }
# MCP server templates ship here when a package needs them ({id, transport,
# command|url, env: env:NAME references only, description}). AIF ships none.
mcps: []
